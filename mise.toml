[tools]
node = "20"

[env]
# Loaded automatically when entering this directory (private dev repo).
# Copy .env.example to .env and fill in IBM Quantum credentials.
_.file = ".env"

[tasks.install]
description = "Install extension dependencies"
run = "cd extension && npm install"

[tasks.build]
description = "Bundle extension and MCP server with esbuild"
depends = ["install"]
run = "cd extension && node esbuild.js"

[tasks.package]
description = "Build VSIX package"
depends = ["build"]
run = "cd extension && npm run package"

[tasks.test-e2e]
description = "End-to-end IBM Quantum smoke test"
depends = ["build"]
run = "bash scripts/test-quantum-e2e.sh"

[tasks.test]
description = "Alias for end-to-end smoke test"
run = "mise run test-e2e"

[tasks.ci]
description = "Pre-push checks: build + e2e smoke test"
run = "mise run build && mise run test-e2e"
