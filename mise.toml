[tools]
node = "20"

[env]
# Loaded automatically when entering this directory (private dev repo).
# Copy .env.example to .env and fill in IBM Quantum credentials.
_.file = ".env"

[tasks.install]
description = "Install extension dependencies"
run = "cd extension && npm install"

[tasks.build]
description = "Bundle extension and MCP server with esbuild"
depends = ["install"]
run = "cd extension && node esbuild.js"

[tasks.package]
description = "Build production VSIX package"
depends = ["build"]
run = "cd extension && npm run bundle:production && npm run package"

[tasks.test-e2e]
description = "End-to-end IBM Quantum smoke test"
depends = ["build"]
run = "bash scripts/test-quantum-e2e.sh"

[tasks.test]
description = "Alias for end-to-end smoke test"
run = "mise run test-e2e"

[tasks.check-secrets]
description = "Scan tracked files for leaked API keys and secrets"
run = "bash scripts/check-secrets.sh"

[tasks.ci]
description = "Pre-push checks: secrets scan + build + e2e smoke test"
run = "mise run check-secrets && mise run build && mise run test-e2e"

[tasks.publish-mcp]
description = "Publish MCP server to registry (npm must be live first)"
run = "cd packages/quantum-openqasm-mcp && npm run publish:mcp"

[tasks.sync-public]
description = "Push docs-only snapshot to public GitHub (requires public remote)"
run = "bash scripts/sync-to-public.sh"

[tasks.setup-dev-repo]
description = "One-time: private gitignore + origin/public remotes"
run = "bash scripts/setup-dev-repo.sh"

[tasks.use-private-gitignore]
description = "Track full source (private dev repo mode)"
run = "bash scripts/use-private-gitignore.sh"
